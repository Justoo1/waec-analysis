# Development override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes vs production:
#   - Uses Dockerfile.dev (no build step, uvicorn --reload)
#   - Mounts source code as volumes for hot reload
#   - Sets NODE_ENV=development
#   - Disables nginx (access web directly on :3000)
#   - Removes restart: unless-stopped (crash-fast in dev)

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      # WSL2: fs events don't cross the VM boundary — force polling so hot reload works
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./apps/web:/app          # live source sync
      - web_node_modules:/app/node_modules   # keep image's node_modules
      - web_next:/app/.next                  # keep build cache inside container
    restart: "no"

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/parser:/app       # live source sync for --reload
    restart: "no"

  worker:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.tasks worker --loglevel=debug --concurrency=1
    volumes:
      - ./apps/parser:/app
    restart: "no"

  # Disable nginx in dev — access services directly on their ports
  nginx:
    profiles:
      - nginx

volumes:
  web_node_modules:
  web_next:
