# ---------------------------------------------------------------
# WAEC Analytics — host nginx snippet for Hostinger server
# SSL is terminated upstream (Cloudflare / Vercel proxy).
# This server only needs to handle plain HTTP from the proxy.
#
# Drop this file in /etc/nginx/conf.d/wassce.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# ---------------------------------------------------------------

# Main app: wassceanalytics.edtmsys.com
server {
    listen 80;
    server_name wassceanalytics.edtmsys.com;

    client_max_body_size 500m;

    location /parser/ {
        rewrite            ^/parser/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass                http://127.0.0.1:3000;
        proxy_http_version        1.1;
        proxy_set_header          Upgrade $http_upgrade;
        proxy_set_header          Connection 'upgrade';
        proxy_set_header          Host $host;
        proxy_set_header          X-Real-IP $remote_addr;
        proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header          X-Forwarded-Proto $scheme;
        proxy_cache_bypass        $http_upgrade;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        proxy_request_buffering   off;
    }
}

# Wildcard school subdomains: school.wassceanalytics.edtmsys.com
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.wassceanalytics\.edtmsys\.com$;

    client_max_body_size 500m;

    location /parser/ {
        rewrite            ^/parser/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
