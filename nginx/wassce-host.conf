# ---------------------------------------------------------------
# WAEC Analytics — host nginx snippet for Hostinger server
# Drop this file in /etc/nginx/conf.d/wassce.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# SSL certs needed:
#   sudo certbot certonly --manual --preferred-challenges dns \
#     -d wassceanalytics.edtmsys.com \
#     -d "*.wassceanalytics.edtmsys.com"
#
# Note: *.edtmsys.com covers the base subdomain but NOT
# *.wassceanalytics.edtmsys.com (wildcard is one level only).
# ---------------------------------------------------------------

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wassceanalytics.edtmsys.com ~^(?<subdomain>.+)\.wassceanalytics\.edtmsys\.com$;
    return 301 https://$host$request_uri;
}

# Main app: wassceanalytics.edtmsys.com
server {
    listen 443 ssl http2;
    server_name wassceanalytics.edtmsys.com;

    ssl_certificate     /etc/letsencrypt/live/wassceanalytics.edtmsys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wassceanalytics.edtmsys.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500m;

    location /parser/ {
        rewrite            ^/parser/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass                http://127.0.0.1:3000;
        proxy_http_version        1.1;
        proxy_set_header          Upgrade $http_upgrade;
        proxy_set_header          Connection 'upgrade';
        proxy_set_header          Host $host;
        proxy_set_header          X-Real-IP $remote_addr;
        proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header          X-Forwarded-Proto $scheme;
        proxy_cache_bypass        $http_upgrade;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        proxy_request_buffering   off;
    }
}

# Wildcard school subdomains: school.wassceanalytics.edtmsys.com
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>.+)\.wassceanalytics\.edtmsys\.com$;

    ssl_certificate     /etc/letsencrypt/live/wassceanalytics.edtmsys.com/fullchain.pem;
