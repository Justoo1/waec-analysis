# ---------------------------------------------------------------
# WAEC Analytics — host nginx config for Hostinger server
# Drop this file in /etc/nginx/conf.d/wassce.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# SSL: reuses the existing *.ghsch.com wildcard cert already on
# the server. That cert covers wassceanalytics.ghsch.com but NOT
# *.wassceanalytics.ghsch.com (wildcard is one level deep).
# School subdomains need a separate cert — see note below.
# ---------------------------------------------------------------

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wassceanalytics.ghsch.com ~^(?<subdomain>.+)\.wassceanalytics\.ghsch\.com$;
    return 301 https://$host$request_uri;
}

# Main app: wassceanalytics.ghsch.com
server {
    listen 443 ssl http2;
    server_name wassceanalytics.ghsch.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 500m;

    location /parser/ {
        rewrite            ^/parser/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass                http://127.0.0.1:3000;
        proxy_http_version        1.1;
        proxy_set_header          Upgrade $http_upgrade;
        proxy_set_header          Connection 'upgrade';
        proxy_set_header          Host $host;
        proxy_set_header          X-Real-IP $remote_addr;
        proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header          X-Forwarded-Proto $scheme;
        proxy_cache_bypass        $http_upgrade;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        proxy_request_buffering   off;
    }
}

# ---------------------------------------------------------------
# School subdomains: school.wassceanalytics.ghsch.com
# NOTE: *.ghsch.com does NOT cover this level. This block will
# only work once a *.wassceanalytics.ghsch.com cert is issued:
#   sudo certbot certonly --manual --preferred-challenges dns \
#     -d "*.wassceanalytics.ghsch.com"
# Until then, school subdomain HTTPS will show a cert warning.
# ---------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>.+)\.wassceanalytics\.ghsch\.com$;

    ssl_certificate     /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 500m;

    location /parser/ {
        rewrite            ^/parser/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass                http://127.0.0.1:3000;
        proxy_http_version        1.1;
        proxy_set_header          Upgrade $http_upgrade;
        proxy_set_header          Connection 'upgrade';
        proxy_set_header          Host $host;
        proxy_set_header          X-Real-IP $remote_addr;
        proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header          X-Forwarded-Proto $scheme;
        proxy_cache_bypass        $http_upgrade;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        proxy_request_buffering   off;
    }
}
