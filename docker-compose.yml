services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      DIRECT_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-https://wassceanalytics.edtmsys.com}
      PARSER_SERVICE_URL: http://parser:8000
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      MINIO_USE_SSL: "false"
      BASE_DOMAIN: ${BASE_DOMAIN:-wassceanalytics.edtmsys.com}
      NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN:-wassceanalytics.edtmsys.com}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      UPLOAD_TMP_DIR: /shared
    volumes:
      - parser_uploads:/shared
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.prod
    entrypoint: ["/app/worker-entrypoint.sh"]
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=1 -Q parsing,qualification,celery
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      UPLOAD_TMP_DIR: /shared
    volumes:
      - parser_uploads:/shared
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 2g
    restart: unless-stopped

  migrator:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      target: migrator
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wassce
      POSTGRES_PASSWORD: wassce
      POSTGRES_DB: wassce_analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wassce -d wassce_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  minio_data:
  parser_uploads:
