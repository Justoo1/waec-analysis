x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      target: runner
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      DIRECT_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-https://wassceanalytics.ghsch.com}
      PARSER_SERVICE_URL: http://parser:8000
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      MINIO_USE_SSL: "false"
      BASE_DOMAIN: ${BASE_DOMAIN:-wassceanalytics.ghsch.com}
      NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN:-wassceanalytics.ghsch.com}
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
    mem_limit: 512m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    logging: *default-logging
    restart: unless-stopped

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      UPLOAD_TMP_DIR: /shared
    volumes:
      - parser_uploads:/shared
    mem_limit: 256m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    logging: *default-logging
    restart: unless-stopped

  worker:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile.prod
    entrypoint: ["/app/worker-entrypoint.sh"]
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=1 -Q parsing,qualification,celery
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-wassce-uploads}
      UPLOAD_TMP_DIR: /shared
    volumes:
      - parser_uploads:/shared
    mem_limit: 1g
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    logging: *default-logging
    restart: unless-stopped

  migrator:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      target: migrator
    environment:
      DATABASE_URL: postgresql://wassce:wassce@db:5432/wassce_analytics
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wassce
      POSTGRES_PASSWORD: wassce
      POSTGRES_DB: wassce_analytics
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wassce -d wassce_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    mem_limit: 128m
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    mem_limit: 256m
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  minio_data:
  parser_uploads:
